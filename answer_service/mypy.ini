[mypy]
mypy_path = src
plugins = pydantic.mypy
files = src, tests
exclude = src/answer_service/setup/config/
python_version = 3.12
strict = true
pretty = true
warn_return_any = true
warn_unreachable = true
warn_unused_ignores = true
warn_redundant_casts = true
allow_redefinition = true
disallow_any_explicit = false
disallow_any_generics = false
disallow_subclassing_any = false
disallow_untyped_decorators = false
show_error_codes = true
show_error_context = true
show_column_numbers = true
check_untyped_defs = true
namespace_packages = true
ignore_missing_imports = true
strict_bytes = true
local_partial_types = true

# pytest-specific settings
disallow_untyped_defs = true
no_implicit_optional = true
disallow_incomplete_defs = true
disallow_any_unimported = false

[mypy-tests.*]
# Allow assert statements in tests (pytest uses them for assertions)
# Allow method assignment for mocks
# Allow attr-defined for mock assertions
# Disable strict enum comparison checks for state transition tests
disable_error_code = assert-type, method-assign, attr-defined, comparison-overlap, unreachable
